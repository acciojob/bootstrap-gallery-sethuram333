<!doctype html>
<html>
<head>
  <title>Cards Gallery</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    .card {
      border-radius: 15px;
      overflow: hidden;
    }
    .card img {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container my-5">
  <h2 class="text-center mb-4">Cards Gallery</h2>

  <!-- Single Row -->
  <div class="row row-cols-1 row-cols-md-3 g-4">

    <!-- Card 1 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image1.jpg"
             class="card-img-top"
             data-index="0"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>Beautiful Landscape</h6>
          <p>Experience the serenity of nature.</p>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image2.jpg"
             class="card-img-top"
             data-index="1"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>Mountain View</h6>
          <p>Feel the calmness of mountains.</p>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image3.jpg"
             class="card-img-top"
             data-index="2"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>Ocean Breeze</h6>
          <p>Relax with ocean waves.</p>
        </div>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image4.jpg"
             class="card-img-top"
             data-index="3"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>Golden Sunset</h6>
          <p>Enjoy beautiful sunset skies.</p>
        </div>
      </div>
    </div>

    <!-- Card 5 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image5.jpg"
             class="card-img-top"
             data-index="4"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>Forest Path</h6>
          <p>Walk through green forest trails.</p>
        </div>
      </div>
    </div>

    <!-- Card 6 -->
    <div class="col">
      <div class="card h-100">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image6.jpg"
             class="card-img-top"
             data-index="5"
             data-bs-toggle="modal"
             data-bs-target="#galleryModal">
        <div class="card-body text-center">
          <h6>City Lights</h6>
          <p>Experience vibrant city life.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal with Carousel -->
<div class="modal fade" id="galleryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark">
      <div class="modal-body p-0">

        <div id="galleryCarousel" class="carousel slide">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image1.jpg"
                   class="d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image2.jpg"
                   class="d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image3.jpg"
                   class="d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image4.jpg"
                   class="d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image5.jpg"
                   class="d-block w-100">
            </div>

            <div class="carousel-item">
              <img src="https://storage.googleapis.com/acciojob-open-file-collections/image6.jpg"
                   class="d-block w-100">
            </div>

          </div>

          <button class="carousel-control-prev"
                  type="button"
                  data-bs-target="#galleryCarousel"
                  data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next"
                  type="button"
                  data-bs-target="#galleryCarousel"
                  data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>

        </div>

      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const galleryModal = document.getElementById('galleryModal');
  galleryModal.addEventListener('show.bs.modal', function (event) {
    const clickedImage = event.relatedTarget;
    const index = clickedImage.getAttribute('data-index');
    const carousel = document.querySelector('#galleryCarousel');
    const bsCarousel = new bootstrap.Carousel(carousel);
    bsCarousel.to(index);
  });
</script>

</body>
</html>
