<!doctype html>
<html>
<head>
  <title>Cards Gallery</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    h2, h6, p {
      text-align: center;
    }

    .card {
      border-radius: 15px;
      overflow: hidden;
    }

    .lightbox {
      cursor: pointer;
      transition: 0.3s;
    }

    /* Fullscreen Lightbox */
    .lightbox.active {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: auto;
      z-index: 9999;
      box-shadow: 0 0 20px #000;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      z-index: 9998;
    }

    .overlay.active {
      display: block;
    }
  </style>
</head>

<body>

<div class="container my-5">
  <h2>Cards Gallery</h2>

  <div class="row row-cols-1 row-cols-md-3 g-4">

    <!-- 6 Cards -->

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image1.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image One</h6>
          <p>Beautiful landscape view.</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image2.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image Two</h6>
          <p>Peaceful mountain scene.</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image3.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image Three</h6>
          <p>Relaxing ocean breeze.</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image4.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image Four</h6>
          <p>Golden sunset moment.</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image5.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image Five</h6>
          <p>Green forest pathway.</p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <img src="https://storage.googleapis.com/acciojob-open-file-collections/image6.jpg"
             class="card-img-top lightbox">
        <div class="card-body">
          <h6>Image Six</h6>
          <p>Vibrant city lights.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="overlay"></div>

<script>
  const images = document.querySelectorAll('.lightbox');
  const overlay = document.querySelector('.overlay');

  images.forEach(img => {
    img.addEventListener('click', function() {
      this.classList.add('active');
      overlay.classList.add('active');
    });
  });

  overlay.addEventListener('click', function() {
    document.querySelector('.lightbox.active')?.classList.remove('active');
    overlay.classList.remove('active');
  });
</script>

</body>
</html>
